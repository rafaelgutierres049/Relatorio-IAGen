<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Financeiro</title>
    <link rel="stylesheet" type="text/css" href="/static/styles.css">
    <style>
        .fundo_rel {
            position: relative;
            background-image: url(/static/imagens/comparacao_ia.webp);
            background-size: cover;
            background-position: center;
            height: 100%;
            width: 100%;
        }

        .fundo_rel::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            background: linear-gradient(to bottom, rgba(0, 0, 0, 1), rgba(0, 0, 0, 0) 50%);
            z-index: 1;
        }

    </style>
</head>
<body>
    <header id="cabecalho">
        <a href="/">Home</a>
        <a href="/relatorio">Gerar</a>
        <a href="/compara">Comparar</a>
        <a href="/encontrar">Encontrar</a>
    </header>

    <div class="fundo_rel">
        <div id="conteudo" style="color:white">
            <div class="container centralizar" style="position: relative; z-index: 2;">
                <form class="caixa_form"  id="compararForm" action="/relatorio" method="post">
                    <div class="centralizar" style="width: 100%; height: 100%; gap: 1rem;">
                        <h2>GERAÇÃO DE RELATÓRIO</h2>
                        <label for="ticker">Digite o Ticker da Ação:</label>
                        <input type="text" id="ticker" name="ticker" required>
                        <button type="submit">Gerar Relatório</button>
                        <div id="spinner"></div>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <footer class="centralizar">
        <div class="footer-grid">
            <p><span>Endereço</span>Rua Exemplo, 123, Cidade, País</p>
            <p><span>Telefone</span>+55 (XX) XXXX-XXXX</p>
            <p><span>E-mail</span>contato@empresa.com</p>
        </div>
    </footer>

</body>
<script>
    document.getElementById('compararForm').onsubmit = function() {
        document.getElementById('spinner').style.visibility = 'visible';
    };
</script>
</html>
