<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparação de Ações</title>
    <link rel="stylesheet" type="text/css" href="/static/styles.css">
    <style>
        .fundo_rel {
            position: relative;
            background-image: url(/static/imagens/comparacao_fundo.webp);
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            height: 100%;
            width: 100%;
        }

        .fundo_rel::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            background: linear-gradient(to bottom, rgba(0, 0, 0, 1), rgba(0, 0, 0, 0) 50%);
            z-index: 1;
        }

    </style>
</head>
<body>
    <header id="cabecalho">
        <a href="/">Home</a>
        <a href="/relatorio">Gerar</a>
        <a href="/compara">Comparar</a>
        <a href="/encontrar">Encontrar</a>
    </header>
    <div class="fundo_rel">
        <div id="conteudo">

            <div class="container centralizar" style="position: relative; z-index: 2;">

                <form class="caixa_form" id="compararForm" action="/compara" method="post" style="height: 72%;">

                    <div class="centralizar" style="width: 100%; height: 100%;gap: 1rem;padding: 1rem;">
                        <h2>COMPARAR AÇÕES</h2>
                            <label for="ticker1">Ticker da Ação 1:</label>
                            <input type="text" id="ticker1" name="ticker1" required>

                            <label for="ticker2">Ticker da Ação 2:</label>
                            <input type="text" id="ticker2" name="ticker2" required>

                            <button type="submit">Comparar</button>
                            <div id="spinner"></div>
                    </div>
                </form>
            </div>
        </div>

    </div>
    <footer class="centralizar">
        <div class="footer-grid">
            <p><span>Endereço</span>Rua Exemplo, 123, Cidade, País</p>
            <p><span>Telefone</span>+55 (XX) XXXX-XXXX</p>
            <p><span>E-mail</span>contato@empresa.com</p>
        </div>
    </footer>
</body>
<script>
    document.getElementById('compararForm').onsubmit = function() {
        document.getElementById('spinner').style.visibility = 'visible';
    };
</script>
</html>
